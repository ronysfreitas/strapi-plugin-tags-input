name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check admin
        run: npx tsc -p admin/tsconfig.json --noEmit

      - name: Type check server
        run: npx tsc -p server/tsconfig.json --noEmit

      - name: Build plugin
        run: npm run build

      - name: Verify plugin package
        run: npm run verify
